<!DOCTYPE html>
<html>
<head>
<title>Flashcard Quiz App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Flashcard Quiz App</h1>

<div class="card">

<h2 id="question">Question</h2>

<p id="answer" style="display:none;">Answer</p>

<button onclick="showAnswer()">
Show Answer
</button>
</div>
<div class="navigation">

<button onclick="previousCard()">
Previous
</button>

<button onclick="nextCard()">
Next
</button>

</div>

<div class="form">

<input type="text" id="newQuestion"
placeholder="Enter Question">

<input type="text" id="newAnswer"
placeholder="Enter Answer">

<button onclick="addCard()">
Add Flashcard
</button>

<button onclick="editCard()">
Edit
</button>

<button onclick="deleteCard()">
Delete
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
